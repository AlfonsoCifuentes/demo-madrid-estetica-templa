<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templa Medical - Tu Oasis Estético</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .mobile-first-container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; }
    </style>
</head>
<body class="bg-stone-50">
    <div class="mobile-first-container shadow-2xl">
        <!-- Minimal Logo -->
        <header class="p-8 text-center">
            <h1 class="text-3xl font-light tracking-[0.4em] uppercase text-stone-800">Templa</h1>
            <div class="h-0.5 w-12 bg-stone-300 mx-auto mt-2"></div>
        </header>

        <!-- Fast Experience (Business-First) -->
        <section class="p-6">
            <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-stone-100 text-center mb-8">
                <h2 class="text-2xl font-bold text-stone-800 mb-4 leading-relaxed">Redescubre el equilibrio en tu piel.</h2>
                <p class="text-sm text-stone-500 mb-8 leading-relaxed">Tratamientos diseñados para resultados visibles desde la primera sesión.</p>
                <button class="bg-stone-800 text-stone-50 px-8 py-4 rounded-full text-xs font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    Explorar Tratamientos
                </button>
            </div>

            <!-- Portfolio Concept (Business-First: Interactive/Visual) -->
            <div class="mb-8">
                <h3 class="text-[10px] font-bold text-stone-400 uppercase tracking-[0.3em] mb-4">Resultados Reales</h3>
                <div class="relative group overflow-hidden rounded-[2rem] shadow-md">
                    <img src="https://images.unsplash.com/photo-1598440947619-2c35fc9aa908?auto=format&fit=crop&q=80&w=800" class="w-full h-64 object-cover">
                    <div class="absolute inset-0 bg-stone-900/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-white font-bold text-sm underline underline-offset-8">Ver Galería</span>
                    </div>
                </div>
            </div>

            <!-- Focus Treatments -->
            <div class="space-y-4">
                <div class="flex justify-between items-center p-6 bg-white rounded-3xl border border-stone-50 shadow-sm">
                    <span class="font-bold text-stone-700">Rejuvenecimiento Facial</span>
                    <span class="text-xl"><span>[Icono Estética]</span></span>
                </div>
                <div class="flex justify-between items-center p-6 bg-white rounded-3xl border border-stone-50 shadow-sm">
                    <span class="font-bold text-stone-700">Contorno Corporal</span>
                    <span class="text-xl">🌀</span>
                </div>
            </div>
        </section>

        <!-- Dynamic Contact (Mobile-First) -->
        <footer class="p-8 bg-stone-100 text-center mt-12 rounded-t-[3rem]">
            <p class="text-xs text-stone-400 mb-6 uppercase tracking-widest">Contáctanos</p>
            <div class="flex justify-center gap-6">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm">Tel:</div>
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm">✉️</div>
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm">📍</div>
            </div>
        </footer>
    </div>
</body>
</html>
